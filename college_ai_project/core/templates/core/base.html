<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>AI Enabled Student Management System</title>

    <style>
    .chat-toggle {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: linear-gradient(135deg, #1abc9c, #3498db);
    color: white;
    padding: 16px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 22px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    transition: 0.3s;
}

.chat-toggle:hover {
    transform: scale(1.1);
}
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f4f6f9;
        }

        .navbar {
            background: #2c3e50;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h2 {
            color: white;
            margin: 0;
        }

        .nav-links a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
            font-weight: 500;
        }

        .nav-links a:hover {
            color: #1abc9c;
        }

        .container {
            padding: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }

        .btn {
            background: #1abc9c;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            text-decoration: none;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background: #16a085;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #34495e;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }
.dark {
    background-color: #121212;
    color: #ffffff;
}

/* Cards */
.dark .card {
    background-color: #1e1e1e;
    color: #ffffff;
}

/* Navbar */
.dark .navbar {
    background-color: #0d1b2a;
}

/* Table */
.dark table {
    background-color: #1e1e1e;
    color: #ffffff;
}

/* Table header */
.dark th {
    background-color: #14213d;
    color: #ffffff;
}

/* Table rows */
.dark td {
    color: #e0e0e0;
}

/* Alternate row */
.dark tr:nth-child(even) {
    background-color: #2a2a2a;
}

/* Hover effect */
.dark tr:hover {
    background-color: #3a3a3a;
}

/* Links */
.dark a {
    color: #4dabf7;
}

.dark a:hover {
    color: #74c0fc;
}

/* Input fields */
.dark input, 
.dark select {
    background-color: #2a2a2a;
    color: white;
    border: 1px solid #555;
}

/* Chart background */
.dark canvas {
    background-color: #1e1e1e;
}
    </style>
</head>
<script>
function toggleDark() {
    document.body.classList.toggle("dark");
    localStorage.setItem("theme",
        document.body.classList.contains("dark") ? "dark" : "light"
    );
}

// Load saved mode
window.onload = function() {
    if(localStorage.getItem("theme") === "dark"){
        document.body.classList.add("dark");
    }
}
</script>
<body>

<div class="navbar">
    <h2>AI Enabled Student Management System</h2>

    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/add-student/">Add Student</a>
        <a href="/add-payment/">Add Payment</a>
        <a href="/ai-report/">AI Report</a>
        <a href="/import-excel/">Import</a>
        <a href="/export-excel/">Export</a>
        <a href="/admin/">Admin</a>
        <a href="/logout/">Logout</a>
        <button onclick="toggleDark()">🌙</button>
    </div>
</div>

<div class="container">
    {% block content %}{% endblock %}
</div>

<style>
.chat-toggle {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #1abc9c;
    color: white;
    padding: 15px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 20px;
}

.chatbox {
    position: fixed;
    bottom: 80px;
    right: 20px;
    width: 300px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    display: none;
    flex-direction: column;
}

.chat-header {
    background: #2c3e50;
    color: white;
    padding: 10px;
    border-radius: 10px 10px 0 0;
}

.chat-body {
    height: 250px;
    overflow-y: auto;
    padding: 10px;
}

.chat-input {
    display: flex;
}

.chat-input input {
    flex: 1;
    padding: 10px;
    border: none;
}

.chat-input button {
    padding: 10px;
    background: #1abc9c;
    border: none;
    color: white;
}
.chat-toggle {
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(26,188,156,0.7); }
    70% { box-shadow: 0 0 0 15px rgba(26,188,156,0); }
    100% { box-shadow: 0 0 0 0 rgba(26,188,156,0); }
}
</style>

<div class="chat-toggle" onclick="toggleChat()">
    <i class="fas fa-brain"></i>
</div>

<div class="chatbox" id="chatbox">
    <div class="chat-header">AI Assistant</div>

    <div class="chat-body" id="chat"></div>

    <div class="chat-input">
        <input id="msg" placeholder="Ask something...">
        <button onclick="sendMsg()">Send</button>
    </div>
</div>

</body>
</html>
