{% extends 'core/base.html' %}

{% block content %}

<div class="card">
    <h2>AI Student Risk Report</h2>

    <p>🔴 High Risk: {{ high }}</p>
    <p>🟠 Medium Risk: {{ medium }}</p>
    <p>🟢 Low Risk: {{ low }}</p>
</div>

<div class="card">
    <h3>AI Suggestions</h3>

    <ul>
        <li>Focus on high-risk students immediately</li>
        <li>Send reminders to medium-risk students</li>
        <li>Offer EMI / discounts</li>
    </ul>
</div>

{% endblock %}
